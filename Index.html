        // --- 2. Helper Functions ---

        // Extract pricing in consistent order based on known possible JSON keys
        function getPrices(item) {
            const priceKeys = ['price', 'normal', 'kono', 'single', 'double', 'special'];
            let prices = [];
            priceKeys.forEach(key => {
                if(item[key] !== undefined) prices.push(item[key]);
            });
            return prices;
        }

        // Render a single menu item row
        function renderItem(item, columns) {
            const prices = getPrices(item);
            let pricesHtml = `<div class="flex gap-2 shrink-0">`;
            
            prices.forEach((p, idx) => {
                const label = columns[idx] || '';
                const showLabel = columns.length > 1; // Only show table header/label if multiple columns exist
                
                pricesHtml += `
                    <div class="flex flex-col items-center justify-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 min-w-[4.5rem] shadow-sm">
                        ${showLabel ? `<span class="text-[10px] text-gray-500 font-bold mb-0.5">${label}</span>` : ''}
                        <span class="text-brand-600 font-bold whitespace-nowrap text-lg leading-none">${p} <span class="text-[10px] font-normal text-gray-400">ج.م</span></span>
                    </div>
                `;
            });
            pricesHtml += `</div>`;

            let descHtml = item.desc ? `<p class="text-sm text-gray-500 mt-1.5 leading-relaxed pr-2 border-r-2 border-brand-100">${item.desc}</p>` : '';
            
            return `
                <div class="py-4 px-5 flex justify-between items-start gap-4 hover:bg-gray-50/50 transition-colors">
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-gray-800 leading-tight">${item.name}</h3>
                        ${descHtml}
                    </div>
                    ${pricesHtml}
                </div>
            `;
        }

                            <div class="flex items-center gap-2 bg-black/40 backdrop-blur-md px-5 py-2.5 rounded-full border border-brand-600/20 shadow-inner">

        function renderNav(categories) {
            return `
                <div class="sticky top-0 z-50 bg-white/95 backdrop-blur-md shadow-sm border-b border-gray-200 py-3">
                    <div class="max-w-3xl mx-auto px-4">
                        <div class="flex overflow-x-auto no-scrollbar gap-2 snap-x" id="nav-scroll-container">
                            ${categories.map(cat => `
                                <a href="#${cat.id}" class="nav-link snap-center shrink-0 px-5 py-2 rounded-full text-sm font-bold bg-white text-gray-600 border border-gray-200 hover:bg-brand-50 hover:text-brand-600 hover:border-brand-200 transition-all shadow-sm whitespace-nowrap" data-target="${cat.id}">
                                    ${cat.name}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCategory(cat) {
            let html = `<section id="${cat.id}" class="scroll-mt-28">`;
            
            // Category Header
            html += `
                <div class="flex items-center gap-3 mb-6">
                    <h2 class="text-2xl md:text-3xl font-black text-brand-600">${cat.name}</h2>
                    <div class="h-0.5 bg-brand-100 flex-1 rounded-full"></div>
                </div>
            `;
            
            html += `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-10">`;

            // Complex Categories (e.g. Crepes with Subsections)
            if (cat.subsections) {
                cat.subsections.forEach((sub, index) => {
                    if(index > 0) html += `<hr class="border-gray-100">`;
                    html += `
                        <div class="bg-gray-50/80 px-5 py-3 text-lg font-bold text-gray-700 flex items-center gap-2 border-r-4 border-brand-500">
                            ${sub.title}
                        </div>
                    `;
                    html += `<div class="divide-y divide-gray-100">`;
                    html += sub.items.map(item => renderItem(item, cat.price_columns)).join('');
                    html += `</div>`;
                });
            } 
            // Standard Categories
            else if (cat.items) {
                html += `<div class="divide-y divide-gray-100">`;
                html += cat.items.map(item => renderItem(item, cat.price_columns)).join('');
                html += `</div>`;
            }

            // Category Addons (e.g. Koshary addons - Rendered as a Grid)
            if (cat.addons) {
                html += `
                    <div class="bg-brand-50 px-5 py-3 text-base font-bold text-brand-900 border-t border-brand-100 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4 text-brand-600"></i>
                        ${cat.addons.title}
                    </div>
                `;
                
                // Addons Grid Layout
                html += `<div class="p-4 bg-brand-50/40 grid grid-cols-2 md:grid-cols-3 gap-3">`;
                html += cat.addons.items.map(item => `
                    <div class="flex justify-between items-center bg-white border border-brand-200 rounded-lg px-3 py-2 shadow-sm hover:border-brand-400 hover:shadow transition-all">
                        <span class="font-bold text-gray-700 text-sm">${item.name}</span>
                        <span class="font-bold text-brand-600">${item.price} <span class="text-[10px] text-gray-400 font-normal">ج.م</span></span>
                    </div>
                `).join('');
                html += `</div>`;
            }

            html += `</div></section>`;
            return html;
        }

        function renderFooter(rest) {
            return `
                <footer class="bg-brand-dark text-gray-400 pt-16 pb-8 border-t-[8px] border-brand-600 mt-12">
                    <div class="max-w-3xl mx-auto px-4 text-center">

                        <div class="w-24 mx-auto opacity-50 grayscale hover:grayscale-0 transition-all duration-300 mb-6">
                             <img src="1000032079.jpg" alt="فيصل" onerror="this.style.display='none';" class="rounded-lg">
                        </div>

                        <h2 class="text-3xl font-black text-brand-accent mb-2">${rest.name_ar}</h2>
                        <p class="text-brand-600 tracking-[0.2em] mb-8 font-bold">${rest.name_en}</p>
                        
                        <div class="flex justify-center gap-4 mb-10 flex-wrap">
                            ${rest.phones.map(phone => `
                                <a href="tel:${phone}" class="flex items-center gap-2 text-white hover:text-brand-dark transition-colors bg-white/10 hover:bg-brand-500 px-5 py-3 rounded-xl border border-white/10 shadow-lg group">
                                    <i data-lucide="phone-call" class="w-5 h-5 group-hover:text-white text-brand-600"></i>
                                    <span dir="ltr" class="font-bold text-lg tracking-wider">${phone}</span>
                                </a>
                            `).join('')}
                        </div>
                        
                        <div class="h-px w-full bg-gradient-to-r from-transparent via-gray-700 to-transparent mb-8"></div>
                        <p class="text-sm flex items-center justify-center gap-1.5 opacity-80">
                            تأسس عام ${rest.established} <i data-lucide="copyright" class="w-3 h-3 mx-1"></i> جميع الحقوق محفوظة
                        </p>
                    </div>
                </footer>
            `;
        }

        // --- 4. Main Initialization ---
        
        document.addEventListener('DOMContentLoaded', () => {
            const app = document.getElementById('app');
            
            // Build the HTML structure
            app.innerHTML = `
                ${renderHero(menuData.restaurant)}
                ${renderNav(menuData.categories)}
                <main class="container mx-auto px-4 py-10 max-w-3xl">
                    ${menuData.categories.map(cat => renderCategory(cat)).join('')}
                </main>
                ${renderFooter(menuData.restaurant)}
            `;

            // Initialize Icons
            lucide.createIcons();

            // Setup Scroll Spy for Sticky Navigation Highlighting
            const sections = document.querySelectorAll('section[id]');
            const navLinks = document.querySelectorAll('.nav-link');
            const navContainer = document.getElementById('nav-scroll-container');

            const observerOptions = {
                root: null,
                rootMargin: '-120px 0px -60% 0px',
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        navLinks.forEach(link => {
                            // Reset styles
                            link.classList.remove('bg-brand-600', 'text-white', 'border-brand-600', 'shadow-md');
                            link.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
                            
                            // Apply active style
                            if (link.dataset.target === entry.target.id) {
                                link.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');
                                link.classList.add('bg-brand-600', 'text-white', 'border-brand-600', 'shadow-md');
                                
                                // Scroll the horizontal nav smoothly to bring active item into view
                                const linkRect = link.getBoundingClientRect();
                                const containerRect = navContainer.getBoundingClientRect();
                                
                                if (linkRect.left < containerRect.left || linkRect.right > containerRect.right) {
                                    navContainer.scrollTo({
                                        left: link.offsetLeft - (containerRect.width / 2) + (linkRect.width / 2),
                                        behavior: 'smooth'
                                    });
                                }
                            }
                        });
                    }
                });
            }, observerOptions);

            sections.forEach(sec => observer.observe(sec));
        });
    </script>
</body>
</html>
